<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Linear scores become probabilities through exponentiation and normalization</title>
  <desc id="desc">A two-panel plot showing linear log odds on the left and the sigmoid probability curve on the right, with softmax as exponentiate then normalize.</desc>
  <defs>
    <style>
      .bg { fill: #fbfaf6; }
      .panel { fill: #ffffff; stroke: #ded8ca; stroke-width: 2; }
      .grid { stroke: #e4dfd3; stroke-width: 1; }
      .axis { stroke: #374151; stroke-width: 2.4; }
      .line { fill: none; stroke: #477998; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .sigmoid { fill: none; stroke: #c25257; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .guide { stroke: #667085; stroke-width: 2; stroke-dasharray: 7 8; }
      .label { fill: #24313d; font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #667085; font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .formula { fill: #263238; font-family: "Times New Roman", serif; font-style: italic; }
    </style>
  </defs>

  <rect width="980" height="560" rx="18" class="bg"/>
  <text x="490" y="48" text-anchor="middle" class="label" font-size="30" font-weight="700">Linear constraints give linear logs, then exponentials give probabilities</text>

  <g transform="translate(65 88)">
    <rect x="0" y="0" width="390" height="345" rx="14" class="panel"/>
    <text x="195" y="38" text-anchor="middle" class="label" font-size="21" font-weight="650">log side: additive</text>
    <line x1="55" y1="275" x2="340" y2="275" class="axis"/>
    <line x1="195" y1="60" x2="195" y2="295" class="axis"/>
    <line x1="55" y1="110" x2="340" y2="110" class="grid"/>
    <line x1="55" y1="192" x2="340" y2="192" class="grid"/>
    <line x1="55" y1="275" x2="340" y2="275" class="grid"/>
    <path d="M60 272 L335 79" class="line"/>
    <text x="248" y="96" class="formula" font-size="23">log odds = x</text>
    <text x="345" y="298" class="muted" font-size="15">score</text>
    <text x="70" y="70" class="muted" font-size="15">log p/(1-p)</text>
  </g>

  <g transform="translate(525 88)">
    <rect x="0" y="0" width="390" height="345" rx="14" class="panel"/>
    <text x="195" y="38" text-anchor="middle" class="label" font-size="21" font-weight="650">probability side: normalized</text>
    <line x1="55" y1="275" x2="340" y2="275" class="axis"/>
    <line x1="195" y1="60" x2="195" y2="295" class="axis"/>
    <line x1="55" y1="76" x2="340" y2="76" class="guide"/>
    <line x1="55" y1="176" x2="340" y2="176" class="guide"/>
    <path d="M60 267 C95 263, 119 252, 141 227 C163 203, 176 175, 195 175 C214 175, 227 147, 249 123 C271 98, 300 83, 335 79" class="sigmoid"/>
    <text x="263" y="112" class="formula" font-size="23">p = 1/(1+e^(-x))</text>
    <text x="345" y="298" class="muted" font-size="15">score</text>
    <text x="65" y="72" class="muted" font-size="15">1</text>
    <text x="65" y="172" class="muted" font-size="15">1/2</text>
  </g>

  <rect x="210" y="470" width="560" height="48" rx="12" fill="#ffffff" stroke="#ded8ca" stroke-width="2"/>
  <text x="490" y="501" text-anchor="middle" class="formula" font-size="24">softmax(s)_i = exp(s_i) / sum_j exp(s_j)</text>
</svg>
