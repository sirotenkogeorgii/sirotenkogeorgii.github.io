<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">When the structure changes, exponentials stop being the answer</title>
  <desc id="desc">Two plots: finite-time blow-up for x prime equals x squared, and a power law produced by scale invariance.</desc>
  <defs>
    <style>
      .bg { fill: #fbfaf6; }
      .panel { fill: #ffffff; stroke: #ded8ca; stroke-width: 2; }
      .grid { stroke: #e4dfd3; stroke-width: 1; }
      .axis { stroke: #374151; stroke-width: 2.4; }
      .curve { fill: none; stroke: #c25257; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .power { fill: none; stroke: #477998; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .asym { stroke: #c25257; stroke-width: 2.5; stroke-dasharray: 7 8; }
      .label { fill: #24313d; font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #667085; font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .formula { fill: #263238; font-family: "Times New Roman", serif; font-style: italic; }
    </style>
  </defs>

  <rect width="980" height="560" rx="18" class="bg"/>
  <text x="490" y="48" text-anchor="middle" class="label" font-size="30" font-weight="700">Exponentials are structural, not universal</text>

  <g transform="translate(65 88)">
    <rect x="0" y="0" width="390" height="355" rx="14" class="panel"/>
    <text x="195" y="40" text-anchor="middle" class="label" font-size="21" font-weight="650">nonlinear feedback</text>
    <line x1="60" y1="285" x2="340" y2="285" class="axis"/>
    <line x1="60" y1="60" x2="60" y2="285" class="axis"/>
    <line x1="120" y1="60" x2="120" y2="285" class="grid"/>
    <line x1="180" y1="60" x2="180" y2="285" class="grid"/>
    <line x1="240" y1="60" x2="240" y2="285" class="grid"/>
    <line x1="300" y1="60" x2="300" y2="285" class="asym"/>
    <path d="M60 245 C105 236, 146 222, 182 198 C215 176, 240 142, 260 96 C275 61, 287 51, 298 49" class="curve"/>
    <text x="186" y="323" text-anchor="middle" class="formula" font-size="22">x' = x^2,  x(t)=1/(1-t)</text>
    <text x="304" y="74" class="muted" font-size="15">blow-up</text>
    <text x="345" y="307" class="muted" font-size="15">t</text>
  </g>

  <g transform="translate(525 88)">
    <rect x="0" y="0" width="390" height="355" rx="14" class="panel"/>
    <text x="195" y="40" text-anchor="middle" class="label" font-size="21" font-weight="650">scale invariance</text>
    <line x1="60" y1="285" x2="340" y2="285" class="axis"/>
    <line x1="60" y1="60" x2="60" y2="285" class="axis"/>
    <line x1="120" y1="60" x2="120" y2="285" class="grid"/>
    <line x1="180" y1="60" x2="180" y2="285" class="grid"/>
    <line x1="240" y1="60" x2="240" y2="285" class="grid"/>
    <line x1="300" y1="60" x2="300" y2="285" class="grid"/>
    <path d="M64 274 C102 263, 134 246, 164 224 C198 198, 226 166, 258 124 C281 94, 305 70, 335 55" class="power"/>
    <text x="195" y="323" text-anchor="middle" class="formula" font-size="22">f(lambda x)=lambda^alpha f(x)</text>
    <text x="232" y="101" class="formula" font-size="22">f(x)=C x^alpha</text>
    <text x="345" y="307" class="muted" font-size="15">x</text>
  </g>

  <text x="490" y="506" text-anchor="middle" class="muted" font-size="18">Change the composition law, memory, or relative rate, and a different canonical function appears.</text>
</svg>
