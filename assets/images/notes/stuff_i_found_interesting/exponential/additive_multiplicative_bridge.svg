<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">The exponential as the bridge from addition to multiplication</title>
  <desc id="desc">A diagram showing additive time increments on the left, exponential multipliers on the right, and the rule exp(lambda times (a plus b)) equals exp(lambda a) times exp(lambda b).</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f5d62"/>
    </marker>
    <style>
      .bg { fill: #fbfaf6; }
      .panel { fill: #ffffff; stroke: #ded8ca; stroke-width: 2; }
      .axis { stroke: #6b7280; stroke-width: 3; stroke-linecap: round; }
      .tick { stroke: #6b7280; stroke-width: 2; }
      .a { fill: #477998; }
      .b { fill: #e08e45; }
      .ab { fill: #2f5d62; }
      .text { fill: #24313d; font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #667085; font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .formula { fill: #263238; font-family: "Times New Roman", serif; font-style: italic; }
    </style>
  </defs>

  <rect width="980" height="420" rx="18" class="bg"/>
  <text x="490" y="52" text-anchor="middle" class="text" font-size="30" font-weight="700">Additive parameter, multiplicative effect</text>

  <rect x="55" y="88" width="395" height="250" rx="14" class="panel"/>
  <text x="252" y="126" text-anchor="middle" class="text" font-size="22" font-weight="650">add on the input side</text>
  <line x1="105" y1="245" x2="400" y2="245" class="axis"/>
  <line x1="105" y1="235" x2="105" y2="255" class="tick"/>
  <line x1="230" y1="235" x2="230" y2="255" class="tick"/>
  <line x1="400" y1="235" x2="400" y2="255" class="tick"/>
  <rect x="105" y="188" width="125" height="34" rx="8" class="a" opacity="0.95"/>
  <rect x="230" y="188" width="170" height="34" rx="8" class="b" opacity="0.95"/>
  <text x="167.5" y="211" text-anchor="middle" fill="#ffffff" font-size="19" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">a</text>
  <text x="315" y="211" text-anchor="middle" fill="#ffffff" font-size="19" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">b</text>
  <text x="105" y="282" text-anchor="middle" class="muted" font-size="16">0</text>
  <text x="230" y="282" text-anchor="middle" class="muted" font-size="16">a</text>
  <text x="400" y="282" text-anchor="middle" class="muted" font-size="16">a + b</text>
  <text x="252" y="316" text-anchor="middle" class="formula" font-size="25">a + b</text>

  <path d="M465 213 C510 213, 522 213, 565 213" fill="none" stroke="#2f5d62" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="515" y="194" text-anchor="middle" class="formula" font-size="24">exp(lambda x)</text>

  <rect x="585" y="88" width="340" height="250" rx="14" class="panel"/>
  <text x="755" y="126" text-anchor="middle" class="text" font-size="22" font-weight="650">multiply on the output side</text>
  <g transform="translate(642 178)">
    <rect x="0" y="0" width="92" height="54" rx="10" class="a" opacity="0.95"/>
    <text x="46" y="34" text-anchor="middle" fill="#ffffff" font-size="17" font-family="'Times New Roman', serif" font-style="italic">exp(&#955;a)</text>
    <text x="112" y="34" class="text" font-size="28">x</text>
    <rect x="145" y="0" width="92" height="54" rx="10" class="b" opacity="0.95"/>
    <text x="191" y="34" text-anchor="middle" fill="#ffffff" font-size="17" font-family="'Times New Roman', serif" font-style="italic">exp(&#955;b)</text>
  </g>
  <line x1="683" y1="272" x2="827" y2="272" stroke="#2f5d62" stroke-width="14" stroke-linecap="round" opacity="0.95"/>
  <text x="755" y="309" text-anchor="middle" class="formula" font-size="24">e^(lambda(a+b))</text>
  <text x="755" y="361" text-anchor="middle" class="formula" font-size="26">exp(lambda(a+b)) = exp(lambda a) exp(lambda b)</text>
</svg>
