<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Exponential growth and decay have constant relative rates</title>
  <desc id="desc">A plot of exp(0.35t) and exp(-0.35t), showing that equal time steps multiply the value by equal factors.</desc>
  <defs>
    <style>
      .bg { fill: #fbfaf6; }
      .grid { stroke: #e4dfd3; stroke-width: 1; }
      .axis { stroke: #374151; stroke-width: 2.5; }
      .growth { fill: none; stroke: #477998; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .decay { fill: none; stroke: #c25257; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .step { stroke: #2f5d62; stroke-width: 2.5; stroke-dasharray: 7 8; }
      .label { fill: #24313d; font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #667085; font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .formula { fill: #263238; font-family: "Times New Roman", serif; font-style: italic; }
    </style>
  </defs>
  <rect width="980" height="560" rx="18" class="bg"/>
  <text x="490" y="48" text-anchor="middle" class="label" font-size="30" font-weight="700">Equal time increments become equal multiplicative factors</text>

  <g transform="translate(86 78)">
    <rect x="0" y="0" width="820" height="405" rx="14" fill="#ffffff" stroke="#ded8ca" stroke-width="2"/>
    <g>
      <line x1="70" y1="330" x2="760" y2="330" class="axis"/>
      <line x1="70" y1="35" x2="70" y2="330" class="axis"/>
      <line x1="185" y1="35" x2="185" y2="330" class="grid"/>
      <line x1="300" y1="35" x2="300" y2="330" class="grid"/>
      <line x1="415" y1="35" x2="415" y2="330" class="grid"/>
      <line x1="530" y1="35" x2="530" y2="330" class="grid"/>
      <line x1="645" y1="35" x2="645" y2="330" class="grid"/>
      <line x1="760" y1="35" x2="760" y2="330" class="grid"/>
      <line x1="70" y1="271" x2="760" y2="271" class="grid"/>
      <line x1="70" y1="212" x2="760" y2="212" class="grid"/>
      <line x1="70" y1="153" x2="760" y2="153" class="grid"/>
      <line x1="70" y1="94" x2="760" y2="94" class="grid"/>
      <text x="765" y="357" class="muted" font-size="15">t</text>
      <text x="38" y="42" class="muted" font-size="15">x(t)</text>
    </g>

    <path class="growth" d="M70 271 C130 265, 182 256, 238 242 C294 228, 351 207, 407 181 C464 154, 522 120, 582 82 C639 47, 702 34, 760 26"/>
    <path class="decay" d="M70 271 C130 277, 182 283, 238 290 C294 297, 351 304, 407 311 C464 317, 522 322, 582 326 C639 329, 702 331, 760 332"/>

    <line x1="300" y1="330" x2="300" y2="228" class="step"/>
    <line x1="415" y1="330" x2="415" y2="181" class="step"/>
    <line x1="530" y1="330" x2="530" y2="120" class="step"/>
    <line x1="300" y1="228" x2="415" y2="181" class="step"/>
    <line x1="415" y1="181" x2="530" y2="120" class="step"/>

    <circle cx="300" cy="228" r="6" fill="#477998"/>
    <circle cx="415" cy="181" r="6" fill="#477998"/>
    <circle cx="530" cy="120" r="6" fill="#477998"/>
    <text x="345" y="220" class="formula" font-size="21">x(t+Delta t)/x(t) = e^(lambda Delta t)</text>

    <g transform="translate(515 285)">
      <rect x="0" y="-23" width="228" height="54" rx="10" fill="#ffffff" stroke="#ded8ca"/>
      <line x1="14" y1="-5" x2="58" y2="-5" class="growth"/>
      <text x="70" y="1" class="label" font-size="17">growth, lambda &gt; 0</text>
      <line x1="14" y1="19" x2="58" y2="19" class="decay"/>
      <text x="70" y="25" class="label" font-size="17">decay, lambda &lt; 0</text>
    </g>
  </g>

  <text x="490" y="525" text-anchor="middle" class="muted" font-size="18">The invariant object is the relative rate: x'(t) / x(t) = lambda.</text>
</svg>
