<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Monte Carlo prediction surfaces for Blackjack</title>
  <desc id="desc">Stylised Blackjack value surfaces after 10000 and 500000 sampled episodes, with and without a usable ace. The surfaces become smoother as more episodes are averaged.</desc>
  <defs>
    <linearGradient id="surfA" x1="0" x2="1" y1="1" y2="0">
      <stop offset="0" stop-color="#b91c1c"/>
      <stop offset="0.5" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="surfB" x1="0" x2="1" y1="1" y2="0">
      <stop offset="0" stop-color="#dc2626"/>
      <stop offset="0.55" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <style>
      .bg{fill:#fff}.panel{fill:#f8fafc;stroke:#dbe1ee;stroke-width:1.5}.grid{stroke:#cbd5e1;stroke-width:1}.axis{stroke:#64748b;stroke-width:2}.label{fill:#172033;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.muted{fill:#64748b}.title{font-size:23px;font-weight:700}.small{font-size:14px}.normal{font-size:17px}.rough{fill:url(#surfB);stroke:#92400e;stroke-width:1.5}.smooth{fill:url(#surfA);stroke:#065f46;stroke-width:1.5}.ridge{stroke:#334155;stroke-width:1.3;fill:none;opacity:.55}
    </style>
  </defs>
  <rect class="bg" width="980" height="520"/>
  <text class="label title" x="490" y="38" text-anchor="middle">Monte Carlo prediction on Blackjack</text>
  <text class="label muted normal" x="490" y="65" text-anchor="middle">More sampled episodes turn noisy return averages into smoother value surfaces.</text>

  <g transform="translate(45 100)">
    <rect class="panel" x="0" y="0" width="420" height="170" rx="14"/>
    <text class="label normal" x="210" y="31" text-anchor="middle" font-weight="700">10,000 episodes, no usable ace</text>
    <path class="axis" d="M70 132 L350 132 L382 108"/>
    <path class="axis" d="M70 132 L70 52"/>
    <path class="rough" d="M82 122 L125 101 L168 116 L210 82 L252 94 L294 58 L340 75 L340 132 L82 132 Z"/>
    <path class="ridge" d="M100 118 L150 95 L205 106 L260 75 L320 72"/>
    <path class="ridge" d="M112 133 L160 113 L220 120 L280 92 L337 98"/>
    <text class="label muted small" x="206" y="158" text-anchor="middle">player sum</text>
    <text class="label muted small" x="354" y="142">dealer</text>
    <text class="label muted small" x="46" y="54">value</text>
  </g>

  <g transform="translate(515 100)">
    <rect class="panel" x="0" y="0" width="420" height="170" rx="14"/>
    <text class="label normal" x="210" y="31" text-anchor="middle" font-weight="700">500,000 episodes, no usable ace</text>
    <path class="axis" d="M70 132 L350 132 L382 108"/>
    <path class="axis" d="M70 132 L70 52"/>
    <path class="smooth" d="M82 122 C135 118, 175 105, 215 88 C260 69, 298 62, 340 56 L340 132 L82 132 Z"/>
    <path class="ridge" d="M100 119 C156 113, 206 96, 250 78 C285 65, 315 60, 338 58"/>
    <path class="ridge" d="M105 132 C155 125, 205 112, 255 92 C295 77, 323 72, 340 72"/>
    <text class="label muted small" x="206" y="158" text-anchor="middle">player sum</text>
    <text class="label muted small" x="354" y="142">dealer</text>
    <text class="label muted small" x="46" y="54">value</text>
  </g>

  <g transform="translate(45 310)">
    <rect class="panel" x="0" y="0" width="420" height="170" rx="14"/>
    <text class="label normal" x="210" y="31" text-anchor="middle" font-weight="700">10,000 episodes, usable ace</text>
    <path class="axis" d="M70 132 L350 132 L382 108"/>
    <path class="axis" d="M70 132 L70 52"/>
    <path class="rough" d="M82 102 L128 88 L170 103 L212 66 L252 78 L296 48 L340 55 L340 132 L82 132 Z"/>
    <path class="ridge" d="M100 101 L148 82 L200 92 L250 62 L318 55"/>
    <path class="ridge" d="M110 122 L165 101 L218 106 L275 80 L338 78"/>
    <text class="label muted small" x="206" y="158" text-anchor="middle">player sum</text>
    <text class="label muted small" x="354" y="142">dealer</text>
    <text class="label muted small" x="46" y="54">value</text>
  </g>

  <g transform="translate(515 310)">
    <rect class="panel" x="0" y="0" width="420" height="170" rx="14"/>
    <text class="label normal" x="210" y="31" text-anchor="middle" font-weight="700">500,000 episodes, usable ace</text>
    <path class="axis" d="M70 132 L350 132 L382 108"/>
    <path class="axis" d="M70 132 L70 52"/>
    <path class="smooth" d="M82 104 C132 98, 174 86, 216 70 C262 52, 300 46, 340 44 L340 132 L82 132 Z"/>
    <path class="ridge" d="M100 101 C150 94, 205 78, 254 60 C290 50, 318 46, 338 45"/>
    <path class="ridge" d="M110 124 C158 116, 210 101, 260 82 C300 68, 326 62, 340 62"/>
    <text class="label muted small" x="206" y="158" text-anchor="middle">player sum</text>
    <text class="label muted small" x="354" y="142">dealer</text>
    <text class="label muted small" x="46" y="54">value</text>
  </g>
</svg>
