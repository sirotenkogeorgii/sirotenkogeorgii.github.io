<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  {% seo %}
  <script>
    (function () {
      var storageKey = 'theme-preference';
      var root = document.documentElement;
      var storedTheme = null;
      try {
        storedTheme = localStorage.getItem(storageKey);
      } catch (e) {}
      var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      var initialTheme = storedTheme || (prefersDark ? 'dark' : 'light');
      root.dataset.theme = initialTheme;
    })();
  </script>
  <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  <script>
    window.MathJax = {
      loader: {load: ['[tex]/mathtools']},
      tex: {
        inlineMath: [['\\(', '\\)'], ['$', '$']],
        displayMath: [['\\[', '\\]'], ['$$', '$$']],
        processEscapes: true,
        packages: {'[+]': ['ams', 'mathtools']},
        macros: {
          widecheck: ['{\\check{#1}}', 1]
        }
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
        ignoreHtmlClass: 'tex2jax_ignore',
        processHtmlClass: 'mathjax-process'
      }
    };
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml-full.js"></script>
</head>
<body class="layout-{{ page.layout | default: 'default' }}">
  <header class="site-header">
    <div class="wrapper">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <div class="site-controls">
        <nav class="site-nav">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/notes/' | relative_url }}">Notes</a>
          <a href="{{ '/tags/' | relative_url }}">Tags</a>
          <a href="{{ '/graph/' | relative_url }}">Graph</a>
          <a href="{{ '/search/' | relative_url }}">Search</a>
        </nav>
        <button class="theme-toggle" type="button" id="theme-toggle" aria-pressed="false" aria-label="Switch to dark theme">
          <svg class="theme-toggle__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
            <g class="theme-toggle__sun">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </g>
            <path class="theme-toggle__moon" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="page-content">
    <div class="wrapper">
      {% unless page.layout == 'note' %}{% include page-tags.html %}{% endunless %}
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrapper">
      <p>© {{ 'now' | date: '%Y' }} {{ site.title }}. Built with <a href="https://jekyllrb.com/">Jekyll</a> &amp; hosted on <a href="https://pages.github.com/">GitHub Pages</a>.</p>
    </div>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.highlighter-rouge').forEach(function (block) {
        var highlight = block.querySelector('.highlight');
        if (!highlight) return;
        var langClass = Array.from(block.classList || []).find(function (cls) {
          return cls.indexOf('language-') === 0;
        });
        if (!langClass) {
          var codeEl = highlight.querySelector('code[class*="language-"]');
          if (codeEl) {
            langClass = Array.from(codeEl.classList).find(function (cls) {
              return cls.indexOf('language-') === 0;
            });
          }
        }
        if (langClass) {
          highlight.setAttribute('data-lang', langClass.replace('language-', '').toUpperCase());
        }
      });
    });
  </script>
  <script>
    (function () {
      var storageKey = 'theme-preference';
      var root = document.documentElement;

      function applyTheme(theme, persist) {
        root.dataset.theme = theme;
        if (persist !== false) {
          try {
            localStorage.setItem(storageKey, theme);
          } catch (e) {}
        }

        var toggle = document.getElementById('theme-toggle');
        var isDark = theme === 'dark';
        if (toggle) {
          toggle.setAttribute('aria-pressed', isDark);
          toggle.setAttribute('aria-label', isDark ? 'Switch to light theme' : 'Switch to dark theme');
        }
      }

      applyTheme(root.dataset.theme || 'light', false);

      var toggleButton = document.getElementById('theme-toggle');
      if (toggleButton) {
        toggleButton.addEventListener('click', function () {
          var nextTheme = root.dataset.theme === 'dark' ? 'light' : 'dark';
          applyTheme(nextTheme, true);
        });
      }

      var media = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)');
      if (media && media.addEventListener) {
        media.addEventListener('change', function (event) {
          var storedTheme = null;
          try {
            storedTheme = localStorage.getItem(storageKey);
          } catch (e) {}
          if (storedTheme) return;
          applyTheme(event.matches ? 'dark' : 'light', false);
        });
      }
    })();
  </script>
</body>
</html>
