---
layout: default
---
<div class="note-container">
  <article class="note">
    <header class="note-header">
      <h1>{{ page.title }}</h1>
      {% assign updated = page.last_modified_at | default: page.date %}
      {% if updated %}
      <p class="note-meta">Written on {{ updated | date: '%B %-d, %Y' }}</p>
      {% endif %}
      {% include page-tags.html %}
    </header>
    <div class="note-content mathjax-process">
      {{ content }}
    </div>
  </article>
</div>
